    function renderStats() {
      const activeLesson = getActiveLesson();
      const totalWords = activeLesson?.words.length || 0;
      const progress = state.quizOrder.length ? Math.round((state.completed / state.quizOrder.length) * 100) : 0;
      const wrongCount = Math.max(state.completed - state.score, 0);

      document.getElementById("miniProgress").textContent = `${progress}%`;
      document.getElementById("miniScore").textContent = `${state.score}/${state.completed || 0}`;
      document.getElementById("miniWrong").textContent = wrongCount;
      document.getElementById("topProgressCount").textContent = `${state.completed} / ${totalWords} thẻ`;
      document.getElementById("progressFill").style.width = `${progress}%`;
      document.getElementById("chipFavCountInline").textContent = state.favorites.length;
      document.getElementById("chipFav").textContent = `${state.favorites.length} yêu thích`;
      document.getElementById("chipWrong").textContent = `${state.wrongWords.length} cần ôn`;
    }

    function questionToneClass() {
      if (state.mode === "multiple-ko-vi") return "tone-emerald";
      if (state.mode === "multiple-vi-ko") return "tone-violet";
      if (state.mode === "typing") return "tone-sky";
      return "tone-amber";
    }

    function initMatchGame() {
      const words = shuffleArray([...getWords()]).slice(0, Math.min(6, getWords().length));
      const cards = [];
      words.forEach((w, index) => {
        cards.push({ id: makeId("mc"), pairId: `${index}`, type: "vocab", text: w.vocab, matched: false, wrong: false });
        cards.push({ id: makeId("mc"), pairId: `${index}`, type: "meaning", text: w.meaning, matched: false, wrong: false });
      });
      state.matchPairs = shuffleArray(cards);
      state.matchSelection = [];
      state.matchMoves = 0;
      state.matchMatchedCount = 0;
      state.matchBusy = false;
    }

    function selectSection(section) {
      state.appSection = section;
      if (section === "play" && !state.matchPairs.length) initMatchGame();
      saveState();
      render();
    }

    function handleMatchCard(cardId) {
      if (state.matchBusy) return;
      const card = state.matchPairs.find(c => c.id === cardId);
      if (!card || card.matched) return;
      if (state.matchSelection.includes(cardId)) return;
      if (state.matchSelection.length >= 2) return;
      card.wrong = false;
      state.matchSelection.push(cardId);
      if (state.matchSelection.length === 2) {
        state.matchMoves += 1;
        const [aId, bId] = state.matchSelection;
        const a = state.matchPairs.find(c => c.id === aId);
        const b = state.matchPairs.find(c => c.id === bId);
        if (a && b && a.pairId === b.pairId && a.type !== b.type) {
          a.matched = true; b.matched = true;
          state.matchSelection = [];
          state.matchMatchedCount += 1;
          playFeedbackSound(true);
          if (state.matchMatchedCount >= Math.min(6, getWords().length)) {
            setTimeout(() => renderQuestion(), 50);
          }
        } else {
          if (a) a.wrong = true;
          if (b) b.wrong = true;
          state.matchBusy = true;
          playFeedbackSound(false);
          setTimeout(() => {
            state.matchPairs.forEach(c => c.wrong = false);
            state.matchSelection = [];
            state.matchBusy = false;
            renderQuestion();
          }, 650);
        }
      }
      renderQuestion();
    }

    function renderQuestion() {
      const current = getCurrent();
      const lesson = getActiveLesson();
      const area = document.getElementById("questionArea");
      if (!lesson) {
        area.innerHTML = `<div class="card question-card"><div style="text-align:center;color:var(--muted);">Chưa có bài nào để học. Hãy tạo bài hoặc nhập Excel vào môn học.</div></div>`;
        return;
      }
      if (state.appSection === "view") {
        area.innerHTML = `<div class="card question-card"></div>`;
        return;
      }
      if (state.appSection === "play") {
        if (!getWords().length) {
          area.innerHTML = `<div class="card question-card"><div style="text-align:center;color:var(--muted);">Bài này chưa có đủ từ để chơi.</div></div>`;
          return;
        }
        if (!state.matchPairs.length) initMatchGame();
        const done = state.matchMatchedCount >= Math.min(6, getWords().length);
        area.innerHTML = `<div class="card question-card"><div class="question-meta">${escapeHtml(getActiveSubject()?.name || "Môn học")} • ${escapeHtml(lesson.name)}</div><div class="question-label">Chọn hai thẻ tương ứng: một từ tiếng Hàn và một nghĩa tiếng Việt</div><div class="match-wrap"><div class="match-top"><div>Đã ghép: ${state.matchMatchedCount}/${Math.min(6, getWords().length)} cặp</div><div>Lượt chọn: ${state.matchMoves}</div></div><div class="match-board">${state.matchPairs.map(card => `<button class="match-card ${state.matchSelection.includes(card.id) ? "active" : ""} ${card.matched ? "matched" : ""} ${card.wrong ? "wrong" : ""}" onclick='handleMatchCard(${JSON.stringify(card.id)})'>${escapeHtml(card.text)}</button>`).join("")}</div>${done ? `<div class="feedback correct" style="margin-top:18px;"><div style="font-weight:800; margin-bottom:8px;">🎉 Hoàn thành</div></div>` : ``}<div class="action-row"><button class="btn btn-outline" onclick="initMatchGame(); renderQuestion();">🔄 Chơi lại</button></div></div></div>`;
        return;
      }
      if (!current) {
        area.innerHTML = `<div class="card question-card"><div style="text-align:center;color:var(--muted);">Bài này chưa có từ vựng. Hãy thêm từ vào bài hiện tại.</div></div>`;
        return;
      }

      let title = "";
      if (state.mode === "multiple-ko-vi") title = current.vocab;
      else if (state.mode === "multiple-vi-ko") title = current.meaning;
      else if (state.mode === "typing") title = current.meaning;
      else if (state.mode === "flashcard") title = current.vocab;
      else title = current.meaning;

      let label = "";
      if (state.mode === "multiple-ko-vi") label = "Chọn nghĩa tiếng Việt đúng cho từ tiếng Hàn";
      else if (state.mode === "multiple-vi-ko") label = "Chọn từ tiếng Hàn đúng cho nghĩa tiếng Việt";
      else if (state.mode === "typing") label = "Nhập từ tiếng Hàn tương ứng với nghĩa";
      else if (state.mode === "flashcard") label = "Flash card từ vựng";
      else label = "Nghe phát âm rồi gõ hoặc bấm micro để nói lại từ tiếng Hàn";

      const compactHeader = state.mode === "flashcard";
      let html = `
        <div class="card question-card">
          ${compactHeader ? `` : `<div class="question-meta">${escapeHtml(getActiveSubject()?.name || "Môn học")} • ${escapeHtml(lesson.name)}</div>
          <div class="question-label">${label}</div>
          <div class="question-text ${questionToneClass()}">${escapeHtml(title)}</div>`}

          <div class="question-head-actions">
            <button class="btn btn-outline" onclick='toggleFavorite(${JSON.stringify(current.vocab)})'>⭐ ${state.favorites.includes(current.vocab) ? "Đã lưu" : "Yêu thích"}</button>
            <button class="btn btn-outline" onclick='speakKorean(${JSON.stringify(current.vocab)}, Number(state.listeningRate))'>🔊 Nghe lại</button>
            <button class="btn btn-outline" onclick='speakKorean(${JSON.stringify(current.vocab)}, 0.72)'>🐢 Đọc chậm</button>
          </div>
      `;

      if (state.mode === "multiple-ko-vi" || state.mode === "multiple-vi-ko") {
        const options = state.currentOptions.length ? state.currentOptions : (state.currentOptions = buildOptionsForCurrent(current));
        const labels = ["A", "B", "C", "D"];
        html += `<div class="choice-grid">`;
        options.forEach((choice, index) => {
          const expected = state.mode === "multiple-ko-vi" ? current.meaning : current.vocab;
          const active = normalizeText(state.selectedChoice) === normalizeText(choice);
          const revealCorrect = state.feedback && normalizeText(choice) === normalizeText(expected);
          const revealWrong = state.feedback && active && !revealCorrect;
          const cls = revealCorrect ? "correct" : revealWrong ? "wrong" : active ? "active" : "";
          html += `
            <button class="choice ${cls}" onclick='selectChoice(${JSON.stringify(choice)})'>
              <span class="choice-badge">${labels[index] || index + 1}</span>
              <span>${escapeHtml(choice)}</span>
            </button>
          `;
        });
        html += `</div>`;
      } else if (state.mode === "flashcard") {
        html += `
          <div class="flashcard-wrap">
            <div class="flashcard ${state.flashcardFlipped ? "is-flipped" : ""}" onclick="toggleFlashcard()">
              <div class="flashcard-face front">
                <div class="flashcard-main tone-emerald">${escapeHtml(current.vocab)}</div>
              </div>
              <div class="flashcard-face back">
                <div class="flashcard-main tone-violet">${escapeHtml(current.meaning)}</div>
              </div>
            </div>
          </div>
          <div class="flashcard-nav">
            <button class="btn btn-outline" onclick="handlePrevious()">← Thẻ trước</button>
            <div class="flashcard-counter">${state.currentIndex + 1} / ${Math.max(state.quizOrder.length, 1)} thẻ</div>
            <button class="btn btn-outline" onclick="handleNext()">Thẻ sau →</button>
          </div>
          <div class="flashcard-actions">
            <button class="btn btn-outline" onclick='speakKorean(${JSON.stringify(current.vocab)}, Number(state.listeningRate))'>🔊 Nghe từ</button>
            <button class="btn btn-outline" onclick='speakKorean(${JSON.stringify(current.vocab)}, 0.72)'>🐢 Đọc chậm</button>
            <button class="btn btn-primary" onclick="toggleFlashcard()">🔄 Lật thẻ</button>
          </div>
        `;
      } else {
        html += `
          <div class="input-row">
            <input id="answerInput" class="text-input" type="text" value="${escapeHtml(state.answer)}" placeholder="Nhập từ tiếng Hàn..." oninput="updateAnswer(this.value)" />
            ${state.mode === "listening" ? `<button class="btn btn-outline" onclick='speakKorean(${JSON.stringify(current.vocab)}, Number(state.listeningRate))'>🔊</button>` : ``}
            <button class="btn btn-outline mic-btn ${state.speechListening ? "listening" : ""}" onclick="toggleSpeechInput()">${state.speechListening ? "●" : "🎤"}</button>
          </div>
          <div id="speechStatus" class="speech-status ${state.speechListening ? "active" : ""}">${escapeHtml(state.speechTranscript || "")}</div>
        `;
      }

      if (state.feedback) {
        html += `
          <div class="feedback ${state.feedback.correct ? "correct" : "wrong"}">
            <div style="font-weight:800; margin-bottom:8px;">${state.feedback.correct ? "✅ Chính xác" : "❌ Chưa đúng"}</div>
            <div style="font-size:14px; line-height:1.7; color:#e5eefc;">
              ${state.mode === "multiple-ko-vi"
                ? `Từ <b>${escapeHtml(current.vocab)}</b> có nghĩa là <b>${escapeHtml(current.meaning)}</b>.`
                : state.mode === "multiple-vi-ko"
                ? `Nghĩa <b>${escapeHtml(current.meaning)}</b> tương ứng với từ <b>${escapeHtml(current.vocab)}</b>.`
                : `Đáp án đúng là <b>${escapeHtml(current.vocab)}</b> — <b>${escapeHtml(current.meaning)}</b>.`}
            </div>
          </div>
        `;
      }

      html += `
          <div class="action-row">
            ${state.mode === "flashcard" ? `` : (!state.feedback ? `<button class="btn btn-dark" onclick="handleSubmit()">📝 Kiểm tra đáp án</button>` : `<button class="btn btn-primary" onclick="handleNext()">Câu tiếp theo</button>`)}
          </div>
        </div>
      `;
      area.innerHTML = html;
    }

    function renderWords() {
      const subject = getActiveSubject();
      const lesson = getActiveLesson();
      const words = getWords();
      const q = normalizeText(state.search);
      let result = [...words];
      if (state.onlyFavorites) result = result.filter(w => state.favorites.includes(w.vocab));
      if (q) result = result.filter(w => normalizeText(w.vocab).includes(q) || normalizeText(w.meaning).includes(q));
      const list = document.getElementById("wordList");
      if (!lesson) {
        list.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted); border:1px dashed var(--border); border-radius:16px;">Chưa có bài nào được chọn.</div>`;
        return;
      }
      if (!result.length) {
        list.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted); border:1px dashed var(--border); border-radius:16px;">Không tìm thấy từ phù hợp.</div>`;
        return;
      }
      list.innerHTML = result.map(w => {
        const wordEditing = state.inlineEdit?.kind === 'word' && state.inlineEdit.wordId === w.id;
        return `
        <div class="word-item">
          <div class="word-head">
            <div style="min-width:0; flex:1;">
              ${wordEditing ? `
                <div class="inline-edit-row">
                  <input id="inlineWordVocab-${w.id}" class="text-input" value="${escapeHtml(w.vocab)}" placeholder="Từ tiếng Hàn" />
                  <input id="inlineWordMeaning-${w.id}" class="text-input" value="${escapeHtml(w.meaning)}" placeholder="Nghĩa tiếng Việt" />
                  <div class="inline-edit-actions">
                    <button class="btn btn-primary" onclick="saveInlineEdit()">Lưu</button>
                    <button class="btn btn-outline" onclick="cancelInlineEdit()">Hủy</button>
                  </div>
                </div>` : `
                <div class="word-vocab">${escapeHtml(w.vocab)} ${state.favorites.includes(w.vocab) ? "⭐" : ""}</div>
                <div class="word-meaning">${escapeHtml(w.meaning)}</div>`}
            </div>
            <div class="word-actions">
              <button class="btn btn-ghost" onclick='toggleFavorite(${JSON.stringify(w.vocab)})'>⭐</button>
              <button class="btn btn-ghost" onclick='speakKorean(${JSON.stringify(w.vocab)}, Number(state.listeningRate))'>🔊</button>
              <button class="btn btn-ghost" onclick='editWord(${JSON.stringify(w.id)})'>✏️</button>
              <button class="btn btn-ghost" onclick='deleteWord(${JSON.stringify(w.id)})'>🗑️</button>
            </div>
          </div>
        </div>`;
      }).join("");
    }

    function renderPanels() {
      document.body.setAttribute("data-theme", state.themeName);
      document.body.setAttribute("data-font", state.fontName);
      document.body.setAttribute("data-display-font", state.displayFontName);
      document.querySelectorAll("#modeTabs button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === state.mode);
      });
      document.querySelectorAll("#sectionPills .mode-pill").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.section === state.appSection);
      });
      document.querySelectorAll("#playTabs button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.playMode === state.playMode);
      });
      const isStudy = state.appSection === "study";
      const isPlay = state.appSection === "play";
      document.getElementById("modeTabs").classList.toggle("hidden", !isStudy);
      document.getElementById("playTabs").classList.toggle("hidden", !isPlay);
      document.querySelector('.stats-strip').classList.toggle('section-hidden', state.appSection !== 'study');
      document.querySelector('.vocab-section').classList.toggle('section-hidden', false);
      document.getElementById("themeSelect").value = state.themeName;
      document.getElementById("fontSelect").value = state.fontName;
      document.getElementById("displayFontSelect").value = state.displayFontName;
      document.getElementById("listeningRate").value = state.listeningRate;
      populateVoiceSelect();
      document.getElementById("toggleFavoritesFilterBtn").textContent = state.onlyFavorites ? "Tất cả từ" : "Từ yêu thích";
      document.getElementById("onlyWrongBtn").textContent = state.onlyWrongPool ? "Đang ôn từ sai" : "Ôn từ sai";
      renderTopicList();
    }

    function render() {
      renderPanels();
      renderStats();
      renderQuestion();
      renderWords();
      renderLookupResults();
    }

    document.getElementById("excelFile").addEventListener("change", (e) => {
      const files = Array.from(e.target.files || []);
      files.forEach(file => parseWorkbook(file));
      e.target.value = "";
    });

    document.getElementById("createSubjectBtn").addEventListener("click", createSubject);
    document.getElementById("createLessonBtn").addEventListener("click", createLesson);
    document.getElementById("addWordBtn").addEventListener("click", addWord);
    document.getElementById("resetBtn").addEventListener("click", () => resetQuiz());
    document.getElementById("shuffleBtn").addEventListener("click", () => {
      state.quizOrder = shuffleArray(state.quizOrder);
      state.currentIndex = 0;
      state.selectedChoice = "";
      state.feedback = null;
      state.currentOptions = buildOptionsForCurrent(getCurrent());
      render();
    });
    document.getElementById("onlyWrongBtn").addEventListener("click", () => {
      state.onlyWrongPool = !state.onlyWrongPool;
      resetQuiz();
    });
    document.getElementById("themeSelect").addEventListener("change", (e) => {
      state.themeName = e.target.value;
      saveState();
      renderPanels();
    });
    document.getElementById("fontSelect").addEventListener("change", (e) => {
      state.fontName = e.target.value;
      saveState();
      renderPanels();
    });
    document.getElementById("displayFontSelect").addEventListener("change", (e) => {
      state.displayFontName = e.target.value;
      saveState();
      renderPanels();
      renderQuestion();
      renderWords();
    });
    document.getElementById("listeningRate").addEventListener("change", (e) => {
      state.listeningRate = e.target.value;
      saveState();
    });
    document.getElementById("voiceSelect").addEventListener("change", (e) => {
      state.selectedVoiceURI = e.target.value;
      state.koreanVoice = getPreferredKoreanVoice();
      saveState();
    });
    document.getElementById("searchInput").addEventListener("input", (e) => {
      state.search = e.target.value;
      renderWords();
    });
    document.getElementById("lookupInput").addEventListener("input", (e) => {
      state.lookupQuery = e.target.value;
    });
    document.getElementById("lookupBtn").addEventListener("click", () => renderLookupResults());
    document.getElementById("lookupScope").addEventListener("change", renderLookupResults);
    document.getElementById("lookupCurrentBtn").addEventListener("click", () => {
      const current = getCurrent();
      applyLookup(current?.vocab || current?.meaning || "", true);
    });
    document.getElementById("openLookupBtn").addEventListener("click", () => openLookupModal());
    document.getElementById("closeLookupBtn").addEventListener("click", closeLookupModal);
    document.getElementById("lookupModal").addEventListener("click", (e) => {
      if (e.target.id === "lookupModal") closeLookupModal();
    });
    document.getElementById("toggleFavoritesFilterBtn").addEventListener("click", () => {
      state.onlyFavorites = !state.onlyFavorites;
      renderWords();
      renderPanels();
    });
    document.querySelectorAll("#modeTabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.mode = btn.dataset.mode;
        state.currentOptions = [];
        resetQuiz();
      });
    });
    document.querySelectorAll("#sectionPills .mode-pill").forEach(btn => {
      btn.addEventListener("click", () => selectSection(btn.dataset.section));
    });
    document.querySelectorAll("#playTabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.playMode = btn.dataset.playMode;
        initMatchGame();
        saveState();
        render();
      });
    });

    window.addEventListener("keydown", (e) => {
      const active = document.activeElement;
      const activeTag = active?.tagName;
      const isTypingField = activeTag === "INPUT" || activeTag === "TEXTAREA";
      const isAnswerInput = active?.id === "answerInput";
      const isChoiceMode = state.appSection === "study" && (state.mode === "multiple-ko-vi" || state.mode === "multiple-vi-ko");
      const isFlashcardMode = state.appSection === "study" && state.mode === "flashcard";
      const isPlayMode = state.appSection === "play";

      if ((e.key.toLowerCase() === 'k') && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        openLookupModal();
        return;
      }

      if (e.key === 'Escape' && state.lookupModalOpen) {
        e.preventDefault();
        closeLookupModal();
        return;
      }

      if (e.key === "/" && !isTypingField && !state.lookupModalOpen) {
        e.preventDefault();
        const input = document.getElementById("answerInput");
        if (input) input.focus();
        return;
      }

      if (e.key.toLowerCase() === "r" && !isTypingField) {
        e.preventDefault();
        const current = getCurrent();
        if (current?.vocab) speakKorean(current.vocab, Number(state.listeningRate));
        return;
      }

      if (e.key.toLowerCase() === "n" && state.feedback && !isTypingField) {
        e.preventDefault();
        handleNext();
        return;
      }

      if ((e.key === "ArrowRight" || e.key === "ArrowDown") && isChoiceMode && !isTypingField) {
        e.preventDefault();
        moveChoiceSelection(1);
        return;
      }

      if ((e.key === "ArrowLeft" || e.key === "ArrowUp") && isChoiceMode && !isTypingField) {
        e.preventDefault();
        moveChoiceSelection(-1);
        return;
      }

      if (isFlashcardMode && !isTypingField && e.key === "ArrowRight") {
        e.preventDefault();
        handleNext();
        return;
      }

      if (isFlashcardMode && !isTypingField && e.key === "ArrowLeft") {
        e.preventDefault();
        handlePrevious();
        return;
      }

      if (e.key === "Enter") {
        if (isAnswerInput) {
          e.preventDefault();
          if (state.feedback) handleNext();
          else handleSubmit();
          return;
        }
        if (!isTypingField) {
          e.preventDefault();
          if (isPlayMode) {
            return;
          } else if (isFlashcardMode) {
            if (state.flashcardFlipped) handleNext();
            else toggleFlashcard(true);
          } else if (state.feedback) handleNext();
          else if (isChoiceMode) {
            if (!state.selectedChoice) moveChoiceSelection(1);
            else handleSubmit();
          } else {
            const input = document.getElementById("answerInput");
            if (input) input.focus();
          }
        }
      }
    });

    initKoreanVoice();
    initSpeechRecognition();
    loadState();
    render();
    resetQuiz();

  </script>
</body>
</html>
