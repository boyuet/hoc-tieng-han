<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Korean Vocabulary Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Lexend:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --app-font: 'Plus Jakarta Sans', Inter, Arial, sans-serif;
      --display-font: 'Noto Sans KR', sans-serif;
      --bg: #07101f;
      --panel: #0f1b2d;
      --border: #1f3552;
      --text: #f8fafc;
      --muted: #93a4bf;
      --primary: #38bdf8;
      --primary-2: #60a5fa;
      --success: #22c55e;
      --danger: #f43f5e;
      --shadow: 0 18px 40px rgba(0,0,0,.22);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--app-font);
      background:
        radial-gradient(circle at 12% 10%, color-mix(in srgb, var(--primary) 18%, transparent), transparent 24%),
        radial-gradient(circle at 85% 12%, color-mix(in srgb, var(--primary-2) 16%, transparent), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.03), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 72%, black 28%) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(130deg, rgba(255,255,255,.03), transparent 30%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.035), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.03), transparent 18%);
      opacity: .85;
    }

    body[data-theme="dark-blue"] {}
    body[data-theme="violet-night"] {
      --bg: #120f24;
      --panel: #17162f;
      --border: #352f63;
      --text: #f8f7ff;
      --muted: #b4add7;
      --primary: #a78bfa;
      --primary-2: #7c3aed;
    }
    body[data-theme="forest-night"] {
      --bg: #071b18;
      --panel: #0f2c26;
      --border: #235046;
      --text: #f3fffb;
      --muted: #9ac6ba;
      --primary: #34d399;
      --primary-2: #10b981;
    }
    body[data-theme="slate-night"] {
      --bg: #0b1020;
      --panel: #151c31;
      --border: #313c5d;
      --text: #f8fafc;
      --muted: #a0aec0;
      --primary: #60a5fa;
      --primary-2: #3b82f6;
    }
    body[data-theme="aurora-glow"] {
      --bg: #06131f;
      --panel: #0d2031;
      --border: #24516b;
      --text: #f3fbff;
      --muted: #9ed7d6;
      --primary: #22d3ee;
      --primary-2: #a78bfa;
    }
    body[data-theme="sunset-coral"] {
      --bg: #1a1020;
      --panel: #28162e;
      --border: #5a344e;
      --text: #fff7fb;
      --muted: #efb0bf;
      --primary: #fb7185;
      --primary-2: #f59e0b;
    }
    body[data-theme="rose-night"] {
      --bg: #140d17;
      --panel: #21131f;
      --border: #4f2b45;
      --text: #fff6fb;
      --muted: #d8abc8;
      --primary: #f472b6;
      --primary-2: #c084fc;
    }

    body[data-font="jakarta"] { --app-font: 'Plus Jakarta Sans', Inter, Arial, sans-serif; }
    body[data-font="vietnam"] { --app-font: 'Be Vietnam Pro', Inter, Arial, sans-serif; }
    body[data-font="lexend"] { --app-font: 'Lexend', Inter, Arial, sans-serif; }

    body[data-display-font="noto-kr"] { --display-font: 'Noto Sans KR', sans-serif; }
    body[data-display-font="jakarta-display"] { --display-font: 'Plus Jakarta Sans', Inter, Arial, sans-serif; }
    body[data-display-font="vietnam-display"] { --display-font: 'Be Vietnam Pro', Inter, Arial, sans-serif; }

    .app-shell {
      max-width: 1260px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 24px;
    }

    .card {
      background: linear-gradient(180deg, rgba(15,27,45,.96), rgba(12,24,42,.96));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 22px;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 18px;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0d1a2d;
      color: #dbeafe;
      font-size: 18px;
      cursor: pointer;
    }

    .sidebar-back { color: #dbeafe; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
    .sidebar-title { margin: 0; font-size: 18px; line-height: 1.3; letter-spacing: -.02em; }
    .sidebar-sub { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.7; }

    .unit-panel {
      margin-top: 8px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #0d1828, #0c1624);
    }

    .unit-panel-head {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .unit-heading { font-size: 15px; font-weight: 800; color: #fff; }

    .btn {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: inherit;
      font-weight: 700;
      transition: .18s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #eff6ff;
      box-shadow: 0 10px 24px rgba(37,99,235,.20);
      padding: 11px 14px;
      width: 100%;
      justify-content: center;
    }
    .btn-outline {
      background: #10213a;
      color: #e5eefc;
      border: 1px solid #244161;
      padding: 11px 14px;
      box-shadow: 0 8px 18px rgba(0,0,0,.16);
    }
    .btn-dark {
      background: linear-gradient(135deg, #172554, #1e3a8a);
      color: white;
      padding: 13px 18px;
      box-shadow: 0 14px 30px rgba(15,23,42,.24);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      padding: 10px 12px;
    }

    .unit-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 62vh;
      overflow: auto;
      padding-right: 4px;
    }

    .unit-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #17314d;
      background: #111c2e;
      cursor: pointer;
      transition: .18s ease;
    }
    .unit-item:hover { border-color: #31577e; background: #142235; }
    .unit-item.active {
      background: linear-gradient(180deg, #163250, #122a45);
      border-color: #2f5f8f;
      color: #eff6ff;
      box-shadow: 0 12px 24px rgba(0,0,0,.16);
    }

    .unit-name { font-weight: 800; color: #fff; line-height: 1.35; font-size: 15px; }
    .unit-file {
      margin-top: 5px;
      font-size: 12px;
      color: #8ea3c0;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .unit-meta { margin-top: 6px; color: #7fb5e8; font-size: 12px; line-height: 1.4; }
    .unit-badge {
      min-width: 42px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #cbe7ff;
      font-size: 12px;
      font-weight: 800;
      padding: 0 8px;
    }

    .study-main { min-width: 0; }
    .study-header { display: flex; justify-content: center; margin-bottom: 14px; }
    .mode-pill-wrap {
      display: flex; gap: 6px; padding: 6px; border-radius: 18px; border: 1px solid var(--border); background: #101b2d;
    }
    .mode-pill {
      padding: 11px 16px; border-radius: 14px; border: none; font-weight: 800; color: #dbeafe; background: transparent; cursor: pointer;
    }
    .mode-pill.active { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #051321; }

    .toolbar {
      padding: 18px 20px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .toolbar::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.03), transparent 35%);
    }
    .toolbar-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; }
    .tabs button {
      min-height: 42px;
      background: #112035;
      border: 1px solid #1d3657;
      color: #c3d2e7;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: -.01em;
    }
    .tabs button.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #061220; border-color: transparent; box-shadow: 0 10px 20px rgba(56,189,248,.18);
    }
    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--border) 92%, white 8%);
      background: color-mix(in srgb, var(--panel) 86%, black 14%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .select {
      height: 42px;
      border-radius: 14px;
      border: 1px solid #22405f;
      padding: 0 13px;
      background: #0f1b2e;
      color: #f8fafc;
      font: inherit;
      font-weight: 700;
      min-width: 124px;
    }
    .progress-top-row {
      display: flex; justify-content: space-between; margin-top: 16px; margin-bottom: 8px; color: #7fb5e8; font-size: 14px;
    }
    .progress-bar {
      width: 100%; height: 8px; border-radius: 999px; background: #13253d; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.2);
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); width: 0%; transition: width .2s ease;
    }

    .question-card {
      border-radius: 22px; padding: 34px 28px 28px; background: linear-gradient(180deg, #111f34, #0f1b2f 100%); border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .question-meta {
      text-align: center; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .18em; color: #8ea3c0; margin-bottom: 8px;
    }
    .question-label {
      text-align: center; color: #9db1ca; font-size: 15px; font-weight: 600; line-height: 1.6;
    }
    .question-text {
      font-family: var(--display-font);
      text-align: center;
      font-size: clamp(28px, 4.6vw, 52px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -.03em;
      margin: 14px auto 0;
      max-width: min(100%, 920px);
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      text-wrap: balance;
      padding-inline: 8px;
    }
    .tone-emerald { color: #34d399; }
    .tone-violet {
      background: linear-gradient(135deg, #7dd3fc, #60a5fa 55%, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tone-sky { color: #38bdf8; }
    .tone-amber { color: #f59e0b; }

    .question-head-actions {
      margin-top: 18px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    }
    .choice-grid {
      max-width: 640px; margin: 22px auto 0; display: grid; grid-template-columns: 1fr; gap: 12px;
    }
    .choice {
      min-height: 64px; display: flex; align-items: center; gap: 14px; border: 1px solid #22405f; border-radius: 16px; padding: 0 18px;
      background: linear-gradient(180deg, #0b1626, #0a1422); color: #f8fafc; font-size: 18px; font-weight: 700; cursor: pointer; transition: .18s ease; box-shadow: 0 8px 18px rgba(0,0,0,.12);
    }
    .choice:hover {
      transform: translateY(-2px); border-color: var(--primary); background: linear-gradient(180deg, #0d1b2e, #0c1728); box-shadow: 0 16px 30px rgba(14,165,233,.10);
    }
    .choice.active {
      border-color: #7dd3fc; background: linear-gradient(180deg, rgba(56,189,248,.30), rgba(37,99,235,.26)); box-shadow: 0 0 0 2px rgba(125,211,252,.18), 0 20px 38px rgba(56,189,248,.18); color: #ffffff; transform: translateY(-1px) scale(1.01);
    }
    .choice.correct {
      background: linear-gradient(180deg, #0b3522, #0a2b1c); border-color: var(--success); color: #dcfce7; box-shadow: 0 18px 34px rgba(34,197,94,.12);
    }
    .choice.wrong {
      background: linear-gradient(180deg, #38131d, #2e1018); border-color: var(--danger); color: #ffe4e6; box-shadow: 0 18px 34px rgba(244,63,94,.10);
    }
    .choice-badge {
      width: 34px; height: 34px; flex-shrink: 0; display: grid; place-items: center; border-radius: 999px; border: 1px solid #2d5579; color: #7fc8ff; font-size: 14px; font-weight: 800; background: rgba(56,189,248,.08);
    }
    .choice.active .choice-badge,
    .choice.correct .choice-badge,
    .choice.wrong .choice-badge {
      border-color: currentColor; color: inherit; background: rgba(255,255,255,.08);
    }

    .input-row {
      max-width: 640px; margin: 22px auto 0; display: flex; gap: 12px; flex-wrap: wrap;
    }
    .text-input {
      flex: 1; min-width: 240px; height: 48px; border-radius: 14px; border: 1px solid #22405f; padding: 0 14px; background: #0f1b2e; color: #f8fafc; font: inherit;
    }

    .feedback {
      margin-top: 18px; padding: 16px; border-radius: 18px; border: 1px solid var(--border); color: #f8fafc;
    }
    .feedback.correct { background: rgba(34,197,94,.16); border-color: var(--success); }
    .feedback.wrong { background: rgba(244,63,94,.14); border-color: var(--danger); }

    .action-row {
      display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 22px;
    }

    .flashcard-wrap {
      max-width: 860px;
      margin: 24px auto 0;
      perspective: 1600px;
    }
    .flashcard {
      position: relative;
      height: clamp(320px, 44vw, 430px);
      min-height: 320px;
      border-radius: 30px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform .5s ease, box-shadow .2s ease;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
    }
    .flashcard:hover { transform: translateY(-2px); }
    .flashcard-wrap { max-width: 860px; margin: 22px auto 0; }
    .flashcard.is-flipped { transform: rotateY(180deg); }
    .flashcard-face {
      position: absolute;
      inset: 0;
      border-radius: 30px;
      padding: clamp(22px, 4vw, 34px);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.07), transparent 24%),
        linear-gradient(180deg, color-mix(in srgb, var(--panel) 96%, white 4%), color-mix(in srgb, var(--panel) 92%, black 8%));
      overflow: auto;
      scrollbar-width: thin;
    }
    .flashcard-face.back { transform: rotateY(180deg); }
    .flashcard-kicker { display:none; }
    .flashcard-main {
      font-family: var(--display-font);
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.08;
      overflow-wrap: anywhere;
      word-break: break-word;
      max-width: 100%;
      max-height: 100%;
      overflow: auto;
      padding: 10px 6px;
      scrollbar-width: none;
    }
    .flashcard-main::-webkit-scrollbar { display:none; }
    .flashcard-sub { display:none; }
    .flashcard-help { display:none; }
    .flashcard-nav {
      margin-top: 16px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      max-width: 860px;
      margin-inline: auto;
    }
    .flashcard-counter {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .04em;
      font-size: 13px;
    }
    .flashcard-actions {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stats-strip {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 18px; margin-bottom: 24px;
    }
    .mini-box {
      background: linear-gradient(180deg, #101c2f, #0e1a2d); border: 1px solid #17314d; border-radius: 18px; padding: 16px; box-shadow: 0 8px 18px rgba(0,0,0,.12);
    }
    .mini-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .16em; color: #8ea3c0;
    }
    .mini-value {
      margin-top: 8px; font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -.02em; color: #f8fafc;
    }

    .vocab-head-row {
      display: flex; justify-content: space-between; align-items: center; gap: 14px; margin-bottom: 14px;
    }
    .vocab-title { margin: 0; font-size: 18px; color: #fff; }
    .vocab-head-actions { display: flex; align-items: center; gap: 12px; }
    .muted-inline { color: #8ea3c0; font-size: 14px; }
    .vocab-panel { padding: 18px; }

    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px;
    }
    .search-wrap .text-input { width: 100%; padding-left: 42px; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .chip {
      border: 1px solid #1e3554; border-radius: 999px; padding: 8px 12px; background: #0f1b2e; color: #dbeafe; font-size: 13px;
    }

    .word-list {
      display: flex; flex-direction: column; gap: 12px; max-height: 640px; overflow: auto; padding-right: 4px;
    }
    .word-item {
      border: 1px solid #17314d; background: linear-gradient(180deg, #0f1a2d, #0d1728); border-radius: 18px; padding: 18px; transition: .18s ease;
    }
    .word-item:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,.18); }
    .word-head {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
    }
    .word-vocab {
      font-family: var(--display-font);
      font-size: 22px; font-weight: 800; letter-spacing: -.02em; color: #fff;
    }
    .word-pronounce { margin-top: 6px; color: #9db1ca; font-size: 13px; }
    .word-meaning { margin-top: 10px; color: #e5eefc; font-size: 16px; font-weight: 700; }
    .word-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .word-note { margin-top: 12px; color: #9db1ca; font-size: 14px; line-height: 1.6; }

    .error-box {
      margin-bottom: 16px; padding: 14px 16px; border-radius: 16px; background: rgba(244,63,94,.12); border: 1px solid rgba(244,63,94,.4); color: #ffe4e6; display: none;
    }
    .error-box.show { display: block; }
    .hidden { display: none !important; }

    .stack-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .stack-actions .btn,
    .stack-actions label.btn {
      width: 100%;
      text-align: center;
    }



    .subject-card {
      padding: 16px;
      margin-bottom: 14px;
      border-radius: 24px;
      border: 1px solid color-mix(in srgb, var(--border) 88%, white 12%);
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel) 96%, white 4%), color-mix(in srgb, var(--panel) 92%, black 8%));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 16px 28px rgba(0,0,0,.14);
    }
    .subject-card.active {
      border-color: color-mix(in srgb, var(--primary) 56%, var(--border) 44%);
      box-shadow: 0 18px 36px rgba(0,0,0,.18), 0 0 0 1px rgba(125,211,252,.12);
    }
    .subject-header {
      display: grid;
      grid-template-columns: minmax(0,1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .subject-main,
    .lesson-main {
      min-width: 0;
      cursor: pointer;
    }
    .subject-title,
    .lesson-title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      margin: 0;
    }
    .subject-icon,
    .lesson-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;

  <button class="lookup-trigger" id="openLookupBtn" type="button">Tra Việt</button>

  <div class="lookup-modal" id="lookupModal" aria-hidden="true">
    <div class="lookup-dialog">
      <div class="lookup-bar">
        <input id="lookupInput" class="text-input" type="text" placeholder="Nhập từ cần tra" />
        <select id="lookupScope" class="select">
          <option value="all">Tất cả</option>

        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-outline" id="lookupCurrentBtn" type="button">Từ đang học</button>

  <input id="excelFile" type="file" accept=".xlsx,.xls" class="hidden" multiple />

  <script>

    const STORAGE_KEY = "korean-vocab-studio-v3";
    const SAMPLE_ROWS = [
      { id: "1", vocab: "사과", meaning: "quả táo" },
      { id: "2", vocab: "학교", meaning: "trường học" },
      { id: "3", vocab: "친구", meaning: "bạn bè" },
      { id: "4", vocab: "물", meaning: "nước" },
      { id: "5", vocab: "가방", meaning: "cái cặp" },
      { id: "6", vocab: "선생님", meaning: "giáo viên" },
    ];

    const defaultSubjects = [
      {
        id: "subject-sample",
        name: "Môn mẫu",
        sourceFile: "Dữ liệu mẫu",
        lessons: [
          {
            id: "lesson-sample-1",
            name: "Bài 1",
            sourceFile: "Dữ liệu mẫu",
            words: SAMPLE_ROWS.map(row => ({ ...row })),
          }
        ]
      }
    ];

    const state = {
      mode: "multiple-ko-vi",
      currentIndex: 0,
      quizOrder: [],
      currentOptions: [],
      answer: "",
      selectedChoice: "",
      feedback: null,
      score: 0,
      completed: 0,
      search: "",
      listeningRate: "0.9",
      themeName: "dark-blue",
      fontName: "jakarta",
      displayFontName: "noto-kr",
      onlyFavorites: false,
      onlyWrongPool: false,
      wrongWords: [],
      favorites: [],
      subjects: JSON.parse(JSON.stringify(defaultSubjects)),
      activeSubjectIndex: 0,
      activeLessonIndex: 0,
      koreanVoice: null,
      availableVoices: [],
      selectedVoiceURI: "auto",
      audioCtx: null,
      appSection: "study",
      playMode: "match-pairs",
      flashcardFlipped: false,
      matchPairs: [],
      matchSelection: [],
      matchMoves: 0,
      matchMatchedCount: 0,
      matchBusy: false,
      speechRecognition: null,
      speechSupported: false,
      speechListening: false,
      speechTranscript: "",
      lookupQuery: "",
      lookupBusy: false,
      lookupModalOpen: false,
      lookupOnlineCache: {},
      inlineEdit: null,
      micSupportedChecked: false,
    };

    function normalizeText(text) {
      return String(text ?? "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function uniqueMeanings(words, excludeMeaning, count = 3) {
      const pool = shuffleArray([...new Set(words.map(w => w.meaning).filter(m => normalizeText(m) !== normalizeText(excludeMeaning)))]);
      return pool.slice(0, count);
    }

    function uniqueVocabs(words, excludeVocab, count = 3) {
      const pool = shuffleArray([...new Set(words.map(w => w.vocab).filter(v => normalizeText(v) !== normalizeText(excludeVocab)))]);
      return pool.slice(0, count);
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function makeId(prefix = "id") {
      return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function createWord(vocab, meaning) {
      return { id: makeId("word"), vocab: String(vocab || "").trim(), meaning: String(meaning || "").trim() };
    }

    function getActiveSubject() {
      return state.subjects[state.activeSubjectIndex] || null;
    }

    function getActiveLesson() {
      return getActiveSubject()?.lessons?.[state.activeLessonIndex] || null;
    }

    function getWords() {
      return getActiveLesson()?.words || [];
    }

    function getCurrent() {
      return state.quizOrder[state.currentIndex] || null;
    }

    function buildOptionsForCurrent(current) {
      const words = getWords();
      if (!current) return [];
      if (state.mode === "multiple-ko-vi") {
        return shuffleArray([current.meaning, ...uniqueMeanings(words, current.meaning, 3)]);
      }
      if (state.mode === "multiple-vi-ko") {
        return shuffleArray([current.vocab, ...uniqueVocabs(words, current.vocab, 3)]);
      }
      return [];
    }


    function getAllWords() {
      const bag = [];
      state.subjects.forEach(subject => {
        (subject.lessons || []).forEach(lesson => {
          (lesson.words || []).forEach(word => {
            bag.push({
              ...word,
              subjectId: subject.id,
              lessonId: lesson.id,
              subjectName: subject.name,
              lessonName: lesson.name,
              sourceFile: lesson.sourceFile || subject.sourceFile || "Dữ liệu",
            });
          });
        });
      });
      return bag;
    }

    function getLookupCandidates(scope = "all") {
      const allWords = getAllWords();
      if (scope === "lesson") {
        const lesson = getActiveLesson();
        return allWords.filter(item => item.lessonId === lesson?.id);
      }
      if (scope === "subject") {
        const subject = getActiveSubject();
        return allWords.filter(item => item.subjectId === subject?.id);
      }
      return allWords;
    }

    function searchDictionary(query, scope = "all") {
      const q = normalizeText(query);
      if (!q) return [];
      const candidates = getLookupCandidates(scope);
      const exact = [];
      const partial = [];
      const seen = new Set();
      candidates.forEach(item => {
        const key = `${normalizeText(item.vocab)}__${normalizeText(item.meaning)}__${normalizeText(item.subjectName)}__${normalizeText(item.lessonName)}`;
        if (seen.has(key)) return;
        const vocabText = normalizeText(item.vocab);
        const meaningText = normalizeText(item.meaning);
        const exactHit = vocabText === q || meaningText === q;
        const partialHit = vocabText.includes(q) || meaningText.includes(q);
        if (!exactHit && !partialHit) return;
        seen.add(key);
        (exactHit ? exact : partial).push(item);
      });
      return [...exact, ...partial].slice(0, 18);
    }

    function fillAnswerFromLookup(text) {
      state.answer = String(text || "");
      const input = document.getElementById("answerInput");
      if (input) {
        input.value = state.answer;
        input.focus();
      }
      renderQuestion();
    }

    function openLookupResult(subjectId, lessonId, vocab) {
      const sIndex = state.subjects.findIndex(item => item.id === subjectId);
      if (sIndex < 0) return;
      const lIndex = state.subjects[sIndex].lessons.findIndex(item => item.id === lessonId);
      if (lIndex < 0) return;
      state.activeSubjectIndex = sIndex;
      state.activeLessonIndex = lIndex;
      state.search = vocab || "";
      saveState();
      resetQuiz();
      document.getElementById("searchInput").value = state.search;
      renderWords();
    }

    function applyLookup(query, autoOpen = true) {
      state.lookupQuery = String(query || '').trim();
      const input = document.getElementById('lookupInput');
      if (input) input.value = state.lookupQuery;
      if (autoOpen) openLookupModal();
      renderLookupResults();
    }

    function openLookupModal(prefill = '') {
      if (prefill) state.lookupQuery = String(prefill).trim();
      state.lookupModalOpen = true;
      const modal = document.getElementById('lookupModal');
      const input = document.getElementById('lookupInput');
      if (modal) {
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
      }
      if (input) {
        input.value = state.lookupQuery || '';
        setTimeout(() => input.focus(), 20);
        if (state.lookupQuery) input.select();
      }
      renderLookupResults();
    }

    function closeLookupModal() {
      state.lookupModalOpen = false;
      const modal = document.getElementById('lookupModal');
      if (modal) {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      }
    }

    function containsKorean(text) {
      return /[ᄀ-ᇿ㄰-㆏가-힯]/.test(String(text || ''));
    }

    function containsLatin(text) {
      return /[A-Za-z]/.test(String(text || ''));
    }

    async function fetchGoogleTranslate(query, sourceLang = 'auto', targetLang = 'vi') {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${encodeURIComponent(sourceLang)}&tl=${encodeURIComponent(targetLang)}&dt=t&q=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('google_translate_failed');
      const data = await res.json();
      const chunks = Array.isArray(data?.[0]) ? data[0] : [];
      return chunks.map(item => String(item?.[0] || '').trim()).join(' ').trim();
    }

    async function fetchMyMemoryTranslate(query, langpair) {
      const normalizedPair = String(langpair || '').trim().toLowerCase();
      if (!normalizedPair || normalizedPair.startsWith('auto|')) return '';
      const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(query)}&langpair=${encodeURIComponent(normalizedPair)}`);
      if (!res.ok) throw new Error('mymemory_failed');
      const data = await res.json();
      const translated = String(data?.responseData?.translatedText || '').trim();
      const matches = Array.isArray(data?.matches) ? data.matches : [];
      return String(matches.find(item => String(item.translation || '').trim())?.translation || translated || '').trim();
    }

    function isInvalidLookupMeaning(text) {
      const value = String(text || '').toLowerCase();
      return [
        'invalid source language',
        'example: langpair',
        'no content',
        'response status',
        'too many requests',
        'mymemory',
        'translated.net'
      ].some(flag => value.includes(flag));
    }

    function normalizeLookupMeaning(text) {
      const value = String(text || '').replace(/<[^>]*>/g, ' ').replace(/&quot;/g, '"').trim();
      if (!value) return '';
      const cleaned = value.replace(/\s+/g, ' ').trim();
      if (isInvalidLookupMeaning(cleaned)) return '';
      if (containsKorean(cleaned) && cleaned.split(/\s+/).length <= 3) return '';
      if (/^[A-Za-z\s-]+$/.test(cleaned) && !containsKorean(cleaned) && cleaned.split(/\s+/).length <= 3) return '';
      return cleaned;
    }

    async function fetchTranslatePair(query, langpair) {
      const [sourceLang = 'auto', targetLang = 'vi'] = String(langpair || 'auto|vi').split('|');
      const attempts = [
        () => fetchGoogleTranslate(query, sourceLang || 'auto', targetLang || 'vi'),
      ];
      if ((sourceLang || 'auto') !== 'auto') {
        attempts.push(() => fetchMyMemoryTranslate(query, `${sourceLang || 'auto'}|${targetLang || 'vi'}`));
      }
      for (const attempt of attempts) {
        try {
          const translated = normalizeLookupMeaning(await attempt());
          if (translated && normalizeText(translated) !== normalizeText(query)) return translated;
        } catch (err) {
        }
      }
      return '';
    }

    async function fetchOnlineLookup(query) {
      const q = String(query || '').trim();
      if (!q) return null;
      const cacheKey = q.toLowerCase();
      if (Object.prototype.hasOwnProperty.call(state.lookupOnlineCache, cacheKey)) return state.lookupOnlineCache[cacheKey];

      const pairs = containsKorean(q)
        ? ['ko|vi', 'auto|vi']
        : containsLatin(q)
        ? ['en|vi', 'auto|vi', 'ko|vi']
        : ['auto|vi', 'ko|vi', 'en|vi'];

      let best = '';
      for (const pair of pairs) {
        best = await fetchTranslatePair(q, pair);
        if (best) break;
      }

      const result = best ? {
        vocab: q,
        meaning: best,
        source: 'online',
        sourceLabel: 'Tra Việt online',
      } : null;

      state.lookupOnlineCache[cacheKey] = result;
      return result;
    }

    async function renderLookupResults() {
      const box = document.getElementById('lookupResult');
      const statusTag = document.getElementById('lookupStatusTag');
      if (!box) return;
      const query = (document.getElementById('lookupInput')?.value || state.lookupQuery || '').trim();
      state.lookupQuery = query;
      const scope = document.getElementById('lookupScope')?.value || 'all';

      if (statusTag) statusTag.textContent = query ? 'Đang tra Việt' : 'Việt';

      if (!query) {
        box.innerHTML = `<div class="lookup-item"><div class="lookup-empty-hint">Nhập từ.</div></div>`;
        if (statusTag) statusTag.textContent = 'Việt';
        return;
      }

      const localResults = searchDictionary(query, scope);
      box.innerHTML = localResults.length
        ? localResults.map(item => `
          <div class="lookup-item">
            <div class="lookup-item-top">
              <div>
                <div class="lookup-vocab">${escapeHtml(item.vocab)}</div>
                <div class="lookup-meaning">${escapeHtml(item.meaning)}</div>
                <div class="lookup-meta">${escapeHtml(item.subjectName)} • ${escapeHtml(item.lessonName)}</div>
                <div class="lookup-source-pill">Trong dữ liệu</div>
              </div>
            </div>
            <div class="lookup-links">
              <button class="btn btn-ghost" onclick='speakKorean(${JSON.stringify(item.vocab)}, Number(state.listeningRate))'>🔊 Nghe</button>
              <button class="btn btn-ghost" onclick='fillAnswerFromLookup(${JSON.stringify(item.vocab)})'>✍️ Điền</button>
              <button class="btn btn-ghost" onclick='openLookupResult(${JSON.stringify(item.subjectId)}, ${JSON.stringify(item.lessonId)}, ${JSON.stringify(item.vocab)})'>📘 Mở bài</button>
            </div>
          </div>
        `).join('')
        : `<div class="lookup-item"><div class="lookup-empty-hint">Đang tra nghĩa tiếng Việt...</div></div>`;

      const requestKey = query;
      state.lookupBusy = true;
      const online = await fetchOnlineLookup(query);
      state.lookupBusy = false;
      if (requestKey !== state.lookupQuery) return;

      const cards = [];
      if (localResults.length) {
        cards.push(...localResults.map(item => `
          <div class="lookup-item">
            <div class="lookup-item-top">
              <div>
                <div class="lookup-vocab">${escapeHtml(item.vocab)}</div>
                <div class="lookup-meaning">${escapeHtml(item.meaning)}</div>
                <div class="lookup-meta">${escapeHtml(item.subjectName)} • ${escapeHtml(item.lessonName)}</div>
                <div class="lookup-source-pill">Trong dữ liệu</div>
              </div>
            </div>
            <div class="lookup-links">
              <button class="btn btn-ghost" onclick='speakKorean(${JSON.stringify(item.vocab)}, Number(state.listeningRate))'>🔊 Nghe</button>
              <button class="btn btn-ghost" onclick='fillAnswerFromLookup(${JSON.stringify(item.vocab)})'>✍️ Điền</button>
              <button class="btn btn-ghost" onclick='openLookupResult(${JSON.stringify(item.subjectId)}, ${JSON.stringify(item.lessonId)}, ${JSON.stringify(item.vocab)})'>📘 Mở bài</button>
            </div>
          </div>
        `));
      }
      if (online) {
        cards.unshift(`
          <div class="lookup-item">
            <div class="lookup-item-top">
              <div>
                <div class="lookup-vocab">${escapeHtml(online.vocab)}</div>
                <div class="lookup-meaning">${escapeHtml(online.meaning)}</div>
                <div class="lookup-source-pill">Nghĩa tiếng Việt</div>
              </div>
            </div>
            <div class="lookup-links">
              ${containsKorean(online.vocab) ? `<button class="btn btn-ghost" onclick='speakKorean(${JSON.stringify(online.vocab)}, Number(state.listeningRate))'>🔊 Nghe</button>` : ''}
              ${containsKorean(online.vocab) ? `<button class="btn btn-ghost" onclick='fillAnswerFromLookup(${JSON.stringify(online.vocab)})'>✍️ Điền</button>` : ''}
            </div>
          </div>
        `);
      }
      if (!cards.length) {
        cards.push(`<div class="lookup-item"><div class="lookup-empty-hint">Không tìm thấy.</div></div>`);
      }
      box.innerHTML = cards.join('');
      if (statusTag) statusTag.textContent = online ? 'Có nghĩa Việt' : (localResults.length ? 'Trong dữ liệu' : 'Không thấy');
    }

    function initSpeechRecognition() {

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        state.speechSupported = false;
        state.micSupportedChecked = true;
        return;
      }
      try {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ko-KR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        recognition.continuous = false;
        recognition.onstart = () => {
          state.speechListening = true;
          state.speechTranscript = 'Đang nghe...';
          renderQuestion();
        };
        recognition.onresult = (event) => {
          const choices = [];
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const piece = (event.results[i][0]?.transcript || '').trim().replace(/\s+/g, '');
            if (piece) choices.push(piece);
          }
          const transcript = choices[0] || '';
          state.answer = transcript;
          state.speechTranscript = transcript;
          const input = document.getElementById('answerInput');
          if (input) input.value = transcript;
          if (state.mode === 'listening' && transcript) {
            setTimeout(() => handleSubmit(), 120);
          } else {
            renderQuestion();
          }
        };
        recognition.onerror = (event) => {
          state.speechListening = false;
          state.speechTranscript = event.error === 'not-allowed'
            ? 'Chưa cấp quyền mic'
            : event.error === 'no-speech'
            ? 'Không nghe rõ'
            : 'Mic lỗi';
          renderQuestion();
        };
        recognition.onend = () => {
          state.speechListening = false;
          renderQuestion();
        };
        state.speechRecognition = recognition;
        state.speechSupported = true;
        state.micSupportedChecked = true;
      } catch (err) {
        console.error(err);
        state.speechSupported = false;
        state.micSupportedChecked = true;
      }
    }

    function toggleSpeechInput() {
      if (!state.micSupportedChecked) initSpeechRecognition();
      if (!state.speechSupported || !state.speechRecognition) {
        state.speechTranscript = 'Thiết bị chưa hỗ trợ mic';
        renderQuestion();
        return;
      }
      try {
        if (state.speechListening) {
          state.speechRecognition.stop();
        } else {
          state.speechTranscript = '';
          state.speechRecognition.lang = 'ko-KR';
          state.speechRecognition.start();
        }
      } catch (err) {
        console.error(err);
        state.speechListening = false;
        state.speechTranscript = 'Mic chưa sẵn sàng';
        renderQuestion();
      }
    }

    function detectColumns(row) {
      const keys = Object.keys(row || {});
      if (!keys.length) return { vocabKey: null, meaningKey: null };

      const vocabCandidates = ["từ vựng", "tu vung", "vocab", "word", "korean", "단어"];
      const meaningCandidates = ["nghĩa", "nghia", "meaning", "vietnamese", "뜻"];

      const findKey = (candidates) => {
        const exact = keys.find(k => candidates.includes(String(k).trim().toLowerCase()));
        if (exact) return exact;
        return keys.find(k => candidates.some(c => String(k).trim().toLowerCase().includes(c))) || null;
      };

      return {
        vocabKey: findKey(vocabCandidates) || keys[0] || null,
        meaningKey: findKey(meaningCandidates) || keys[1] || null,
      };
    }

    function migrateLegacyData(saved) {
      if (Array.isArray(saved.subjects) && saved.subjects.length) return saved.subjects;
      if (Array.isArray(saved.topicFiles) && saved.topicFiles.length) {
        return [{
          id: makeId("subject"),
          name: "Môn học cũ",
          sourceFile: "Dữ liệu đã chuyển đổi",
          lessons: saved.topicFiles.map(topic => ({
            id: topic.id || makeId("lesson"),
            name: topic.name || "Bài học",
            sourceFile: topic.sourceFile || "Dữ liệu đã lưu",
            words: Array.isArray(topic.words) ? topic.words : [],
          }))
        }];
      }
      return JSON.parse(JSON.stringify(defaultSubjects));
    }

    function saveState() {
      const persistable = {
        themeName: state.themeName,
        fontName: state.fontName,
        displayFontName: state.displayFontName,
        listeningRate: state.listeningRate,
        selectedVoiceURI: state.selectedVoiceURI,
        subjects: state.subjects,
        favorites: state.favorites,
        wrongWords: state.wrongWords,
        activeSubjectIndex: state.activeSubjectIndex,
        activeLessonIndex: state.activeLessonIndex,
        appSection: state.appSection,
        playMode: state.playMode,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(persistable));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem("korean-vocab-studio-v2");
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.themeName) state.themeName = saved.themeName;
        if (saved.fontName) state.fontName = saved.fontName;
        if (saved.displayFontName) state.displayFontName = saved.displayFontName;
        if (saved.listeningRate) state.listeningRate = String(saved.listeningRate);
        if (saved.selectedVoiceURI) state.selectedVoiceURI = String(saved.selectedVoiceURI);
        state.subjects = migrateLegacyData(saved);
        if (Array.isArray(saved.favorites)) state.favorites = saved.favorites;
        if (Array.isArray(saved.wrongWords)) state.wrongWords = saved.wrongWords;
        if (Number.isInteger(saved.activeSubjectIndex) && saved.activeSubjectIndex >= 0 && saved.activeSubjectIndex < state.subjects.length) {
          state.activeSubjectIndex = saved.activeSubjectIndex;
        }
        if (saved.appSection) state.appSection = saved.appSection;
        if (saved.playMode) state.playMode = saved.playMode;
        const lessons = getActiveSubject()?.lessons || [];
        if (Number.isInteger(saved.activeLessonIndex) && saved.activeLessonIndex >= 0 && saved.activeLessonIndex < lessons.length) {
          state.activeLessonIndex = saved.activeLessonIndex;
        }
      } catch (err) {
        console.error("Không thể tải dữ liệu đã lưu", err);
      }
    }

    function populateVoiceSelect() {
      const select = document.getElementById("voiceSelect");
      if (!select) return;
      const current = state.selectedVoiceURI || "auto";
      const koreanVoices = state.availableVoices;
      select.innerHTML = `<option value="auto">Giọng Hàn: Tự động</option>` + koreanVoices.map(voice => {
        const safeName = escapeHtml(voice.name || voice.lang || "Korean");
        const safeUri = escapeHtml(voice.voiceURI || voice.name || "");
        return `<option value="${safeUri}">${safeName}</option>`;
      }).join("");
      select.value = koreanVoices.some(v => (v.voiceURI || v.name) === current) ? current : "auto";
    }

    function getPreferredKoreanVoice() {
      const koreanVoices = state.availableVoices || [];
      if (!koreanVoices.length) return null;
      if (state.selectedVoiceURI && state.selectedVoiceURI !== "auto") {
        const chosen = koreanVoices.find(v => (v.voiceURI || v.name) === state.selectedVoiceURI);
        if (chosen) return chosen;
      }
      const scored = [...koreanVoices].sort((a, b) => scoreVoice(b) - scoreVoice(a));
      return scored[0] || null;
    }

    function scoreVoice(voice) {
      const name = String(voice?.name || '').toLowerCase();
      let score = 0;
      if (name.includes('google')) score += 6;
      if (name.includes('microsoft')) score += 5;
      if (name.includes('natural')) score += 5;
      if (name.includes('premium')) score += 4;
      if (name.includes('female')) score += 1;
      if ((voice?.lang || '').toLowerCase().startsWith('ko')) score += 4;
      return score;
    }

    function initKoreanVoice() {
      if (!window.speechSynthesis) return;
      const pickVoice = () => {
        const voices = window.speechSynthesis.getVoices() || [];
        state.availableVoices = voices.filter(v =>
          (v.lang || "").toLowerCase().startsWith("ko") ||
          (v.name || "").toLowerCase().includes("korean") ||
          (v.name || "").includes("한국")
        );
        state.koreanVoice = getPreferredKoreanVoice();
        populateVoiceSelect();
      };
      pickVoice();
      window.speechSynthesis.onvoiceschanged = pickVoice;
    }

    function playSpeakCue() {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();
      osc1.type = 'sine';
      osc2.type = 'triangle';
      osc1.frequency.setValueAtTime(740, now);
      osc2.frequency.setValueAtTime(1110, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.035, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(ctx.destination);
      osc1.start(now);
      osc2.start(now + 0.01);
      osc1.stop(now + 0.14);
      osc2.stop(now + 0.16);
    }

    function speakKorean(text, rate = 0.9) {
      if (!window.speechSynthesis || !text) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(String(text).trim());
      utter.lang = "ko-KR";
      utter.rate = Math.max(0.65, Math.min(Number(rate) || 0.9, 1.08));
      utter.pitch = Number(rate) < 0.8 ? 0.98 : 1.06;
      utter.volume = 1;
      const preferred = getPreferredKoreanVoice();
      if (preferred) utter.voice = preferred;
      state.koreanVoice = preferred;
      playSpeakCue();
      setTimeout(() => window.speechSynthesis.speak(utter), 45);
    }

    function ensureAudioContext() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return null;
      if (!state.audioCtx) state.audioCtx = new AudioCtx();
      if (state.audioCtx.state === "suspended") state.audioCtx.resume();
      return state.audioCtx;
    }

    function playFeedbackSound(isCorrect) {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      const now = ctx.currentTime;
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(isCorrect ? 880 : 320, now);
      oscillator.frequency.exponentialRampToValueAtTime(isCorrect ? 1175 : 220, now + (isCorrect ? 0.16 : 0.22));
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + (isCorrect ? 0.2 : 0.24));
      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.start(now);
      oscillator.stop(now + (isCorrect ? 0.22 : 0.26));
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.textContent = message;
      box.classList.add("show");
    }

    function hideError() {
      const box = document.getElementById("errorBox");
      box.textContent = "";
      box.classList.remove("show");
    }

    function createSubject() {
      const name = prompt("Nhập tên môn học/folder mới:", "Môn học mới");
      if (!name || !name.trim()) return;
      state.subjects.push({
        id: makeId("subject"),
        name: name.trim(),
        sourceFile: "Tạo thủ công",
        lessons: [],
      });
      state.activeSubjectIndex = state.subjects.length - 1;
      state.activeLessonIndex = 0;
      saveState();
      resetQuiz();
    }

    function createLesson() {
      const subject = getActiveSubject();
      if (!subject) {
        showError("Hãy tạo môn học trước rồi mới thêm bài.");
        return;
      }
      const name = prompt(`Nhập tên bài từ vựng trong môn học "${subject.name}":`, `Bài ${subject.lessons.length + 1}`);
      if (!name || !name.trim()) return;
      subject.lessons.push({
        id: makeId("lesson"),
        name: name.trim(),
        sourceFile: "Tạo thủ công",
        words: [],
      });
      state.activeLessonIndex = subject.lessons.length - 1;
      saveState();
      resetQuiz();
    }

    function startInlineEdit(kind, payload = {}) {
      state.inlineEdit = { kind, ...payload };
      render();
      requestAnimationFrame(() => {
        const firstInput = document.querySelector('.inline-edit-row input');
        if (firstInput) firstInput.focus();
      });
    }

    function cancelInlineEdit() {
      state.inlineEdit = null;
      render();
    }

    function saveInlineEdit() {
      const edit = state.inlineEdit;
      if (!edit) return;
      if (edit.kind === 'subject') {
        const subject = state.subjects[edit.subjectIndex];
        if (!subject) return;
        const name = document.getElementById('inlineSubjectName')?.value?.trim();
        if (name) subject.name = name;
      } else if (edit.kind === 'lesson') {
        const lesson = state.subjects[edit.subjectIndex]?.lessons?.[edit.lessonIndex];
        if (!lesson) return;
        const name = document.getElementById('inlineLessonName')?.value?.trim();
        if (name) lesson.name = name;
      } else if (edit.kind === 'word') {
        const lesson = getActiveLesson();
        const word = lesson?.words.find(item => item.id === edit.wordId);
        if (!word) return;
        const vocab = document.getElementById(`inlineWordVocab-${edit.wordId}`)?.value?.trim();
        const meaning = document.getElementById(`inlineWordMeaning-${edit.wordId}`)?.value?.trim();
        const wasFavorite = state.favorites.includes(edit.originalVocab);
        if (vocab) word.vocab = vocab;
        if (meaning) word.meaning = meaning;
        state.favorites = state.favorites.filter(item => item !== edit.originalVocab);
        if (wasFavorite && word.vocab) state.favorites.push(word.vocab);
      }
      state.inlineEdit = null;
      saveState();
      resetQuiz();
      render();
    }

    function renameSubject(index) {
      startInlineEdit('subject', { subjectIndex: index });
    }

    function deleteSubject(index) {
      const subject = state.subjects[index];
      if (!subject) return;
      if (!confirm(`Bạn chắc chắn muốn xóa folder "${subject.name}" và toàn bộ bài bên trong?`)) return;
      state.subjects.splice(index, 1);
      if (!state.subjects.length) state.subjects = JSON.parse(JSON.stringify(defaultSubjects));
      state.activeSubjectIndex = Math.min(state.activeSubjectIndex, state.subjects.length - 1);
      state.activeLessonIndex = 0;
      saveState();
      resetQuiz();
    }

    function renameLesson(subjectIndex, lessonIndex) {
      startInlineEdit('lesson', { subjectIndex, lessonIndex });
    }

    function deleteLesson(subjectIndex, lessonIndex) {
      const subject = state.subjects[subjectIndex];
      const lesson = subject?.lessons?.[lessonIndex];
      if (!subject || !lesson) return;
      if (!confirm(`Bạn chắc chắn muốn xóa bài "${lesson.name}"?`)) return;
      subject.lessons.splice(lessonIndex, 1);
      if (!subject.lessons.length) {
        subject.lessons.push({ id: makeId("lesson"), name: "Bài 1", sourceFile: "Tạo thủ công", words: [] });
      }
      if (state.activeSubjectIndex === subjectIndex) {
        state.activeLessonIndex = Math.min(state.activeLessonIndex, subject.lessons.length - 1);
      }
      saveState();
      resetQuiz();
    }

    function selectLesson(subjectIndex, lessonIndex) {
      if (!state.subjects[subjectIndex]?.lessons?.[lessonIndex]) return;
      state.activeSubjectIndex = subjectIndex;
      state.activeLessonIndex = lessonIndex;
      state.wrongWords = [];
      state.favorites = [];
      saveState();
      resetQuiz();
    }

    function parseWorkbook(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });

          if (!state.subjects.length) {
            state.subjects.push({ id: makeId("subject"), name: file.name.replace(/\.[^.]+$/, ""), sourceFile: file.name, lessons: [] });
            state.activeSubjectIndex = state.subjects.length - 1;
          }
          const subject = getActiveSubject();
          if (!subject) return;

          const addedLessons = [];
          workbook.SheetNames.forEach((sheetName, sheetIndex) => {
            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
            if (!json.length) return;
            const { vocabKey, meaningKey } = detectColumns(json[0]);
            if (!vocabKey || !meaningKey) return;
            const rows = json
              .map((row, index) => ({
                id: `${sheetIndex}-${index}-${String(row[vocabKey] ?? "").trim()}`,
                vocab: String(row[vocabKey] ?? "").trim(),
                meaning: String(row[meaningKey] ?? "").trim(),
              }))
              .filter(r => r.vocab && r.meaning);
            if (!rows.length) return;
            addedLessons.push({
              id: makeId("lesson"),
              name: sheetName,
              sourceFile: file.name,
              words: rows,
            });
          });

          if (!addedLessons.length) {
            showError("Không tìm thấy sheet hợp lệ có 2 cột từ vựng và nghĩa.");
            return;
          }

          subject.lessons.push(...addedLessons);
          state.activeLessonIndex = subject.lessons.length - addedLessons.length;
          state.wrongWords = [];
          state.favorites = [];
          hideError();
          saveState();
          resetQuiz();
        } catch (err) {
          console.error(err);
          showError("Không thể đọc file Excel. Vui lòng kiểm tra định dạng .xlsx hoặc .xls.");
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function getStudyPool() {
      const words = getWords();
      if (state.onlyWrongPool && state.wrongWords.length) {
        return words.filter(w => state.wrongWords.some(x => normalizeText(x.vocab) === normalizeText(w.vocab)));
      }
      return words;
    }

    function resetQuiz() {
      const words = getWords();
      const source = getStudyPool();
      state.quizOrder = shuffleArray(source.length ? source : words);
      state.currentIndex = 0;
      state.answer = "";
      state.selectedChoice = "";
      state.feedback = null;
      state.currentOptions = [];
      state.score = 0;
      state.completed = 0;
      hideError();
      if (state.mode === "multiple-ko-vi" || state.mode === "multiple-vi-ko") {
        state.currentOptions = buildOptionsForCurrent(getCurrent());
      }
      if (state.mode === "listening" && state.quizOrder[0]) {
        setTimeout(() => speakKorean(state.quizOrder[0].vocab, Number(state.listeningRate)), 180);
      }
      render();
    }

    function markWrongWord(word) {
      if (!state.wrongWords.some(item => normalizeText(item.vocab) === normalizeText(word.vocab))) {
        state.wrongWords.push(word);
        saveState();
      }
    }

    function toggleFavorite(vocab) {
      if (state.favorites.includes(vocab)) state.favorites = state.favorites.filter(v => v !== vocab);
      else state.favorites.push(vocab);
      saveState();
      renderWords();
      renderStats();
    }

    function addWord() {
      const lesson = getActiveLesson();
      if (!lesson) {
        showError("Hãy tạo hoặc chọn một bài trước khi thêm từ.");
        return;
      }
      const vocab = prompt(`Thêm từ tiếng Hàn cho bài "${lesson.name}":`);
      if (!vocab || !vocab.trim()) return;
      const meaning = prompt(`Nhập nghĩa tiếng Việt cho từ "${vocab.trim()}":`);
      if (!meaning || !meaning.trim()) return;
      lesson.words.push(createWord(vocab.trim(), meaning.trim()));
      saveState();
      resetQuiz();
    }

    function editWord(wordId) {
      const word = getActiveLesson()?.words.find(item => item.id === wordId);
      if (!word) return;
      startInlineEdit('word', { wordId, originalVocab: word.vocab });
    }

    function deleteWord(wordId) {
      const lesson = getActiveLesson();
      if (!lesson) return;
      const index = lesson.words.findIndex(w => w.id === wordId);
      if (index < 0) return;
      if (!confirm(`Xóa từ "${lesson.words[index].vocab}"?`)) return;
      lesson.words.splice(index, 1);
      saveState();
      resetQuiz();
    }

    function getOptions(current) {
      if (!current) return [];
      if (state.mode !== "multiple-ko-vi" && state.mode !== "multiple-vi-ko") return [];
      if (!Array.isArray(state.currentOptions) || !state.currentOptions.length) {
        state.currentOptions = buildOptionsForCurrent(current);
      }
      return state.currentOptions;
    }

    function handleSubmit() {
      const current = getCurrent();
      if (!current || state.feedback) return;

      let correct = false;
      if (state.mode === "multiple-ko-vi") correct = normalizeText(state.selectedChoice) === normalizeText(current.meaning);
      else if (state.mode === "multiple-vi-ko") correct = normalizeText(state.selectedChoice) === normalizeText(current.vocab);
      else correct = normalizeText(state.answer) === normalizeText(current.vocab);

      state.feedback = { correct };
      state.completed += 1;
      if (correct) state.score += 1;
      else markWrongWord(current);
      playFeedbackSound(correct);
      render();
    }

    function jumpToCard(targetIndex) {
      state.answer = "";
      state.selectedChoice = "";
      state.feedback = null;
      state.flashcardFlipped = false;
      state.currentOptions = [];

      if (!state.quizOrder.length) {
        const reshuffled = shuffleArray(getStudyPool());
        state.quizOrder = reshuffled.length ? reshuffled : shuffleArray(getWords());
      }
      const total = state.quizOrder.length;
      state.currentIndex = total ? (targetIndex + total) % total : 0;

      const current = getCurrent();
      if (state.mode === "multiple-ko-vi" || state.mode === "multiple-vi-ko") {
        state.currentOptions = buildOptionsForCurrent(current);
      } else {
        state.currentOptions = [];
      }
      if (state.mode === "listening" && current) {
        setTimeout(() => speakKorean(current.vocab, Number(state.listeningRate)), 160);
      }
      render();
    }

    function handleNext() {
      jumpToCard(state.currentIndex + 1);
    }

    function handlePrevious() {
      jumpToCard(state.currentIndex - 1);
    }

    function selectChoice(choice) {
      if (state.feedback) return;
      state.selectedChoice = choice;
      renderQuestion();
    }

    function moveChoiceSelection(step) {
      const current = getCurrent();
      if (!current || state.feedback) return;
      const options = state.currentOptions.length ? state.currentOptions : (state.currentOptions = buildOptionsForCurrent(current));
      if (!options.length) return;
      const currentIndex = options.findIndex(choice => normalizeText(choice) === normalizeText(state.selectedChoice));
      const nextIndex = currentIndex < 0 ? 0 : (currentIndex + step + options.length) % options.length;
      state.selectedChoice = options[nextIndex];
      renderQuestion();
    }

    function updateAnswer(value) {
      state.answer = value;
    }

    function toggleFlashcard(forceValue) {
      state.flashcardFlipped = typeof forceValue === "boolean" ? forceValue : !state.flashcardFlipped;
      renderQuestion();
    }
